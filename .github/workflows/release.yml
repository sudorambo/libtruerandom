name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure (shared)
        run: cmake -B build-shared -DCMAKE_BUILD_TYPE=Release -DTRUERANDOM_TESTS=ON
      - name: Build (shared)
        run: cmake --build build-shared
      - name: Test (shared)
        run: ctest --test-dir build-shared --output-on-failure
      - name: Configure (static)
        run: cmake -B build-static -DCMAKE_BUILD_TYPE=Release -DTRUERANDOM_TESTS=OFF -DBUILD_SHARED_LIBS=OFF
      - name: Build (static)
        run: cmake --build build-static
      - name: Package
        run: |
          mkdir -p dist
          cp build-shared/libtruerandom.so* dist/
          cp build-static/libtruerandom.a dist/
          cp include/truerandom/truerandom.h dist/
          cp LICENSE dist/
          tar czf libtruerandom-${GITHUB_REF_NAME}-linux-x86_64.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: libtruerandom-*-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DTRUERANDOM_TESTS=ON -DBUILD_SHARED_LIBS=OFF
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp build/Release/truerandom.lib dist/
          cp include/truerandom/truerandom.h dist/
          cp LICENSE dist/
          tar czf libtruerandom-${GITHUB_REF_NAME}-windows-x86_64.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: libtruerandom-*-windows-x86_64.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure (shared)
        run: cmake -B build-shared -DCMAKE_BUILD_TYPE=Release -DTRUERANDOM_TESTS=ON
      - name: Build (shared)
        run: cmake --build build-shared
      - name: Test (shared)
        run: ctest --test-dir build-shared --output-on-failure
      - name: Configure (static)
        run: cmake -B build-static -DCMAKE_BUILD_TYPE=Release -DTRUERANDOM_TESTS=OFF -DBUILD_SHARED_LIBS=OFF
      - name: Build (static)
        run: cmake --build build-static
      - name: Package
        run: |
          mkdir -p dist
          cp build-shared/libtruerandom.dylib dist/
          cp build-static/libtruerandom.a dist/
          cp include/truerandom/truerandom.h dist/
          cp LICENSE dist/
          tar czf libtruerandom-${GITHUB_REF_NAME}-macos-arm64.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: libtruerandom-*-macos-arm64.tar.gz

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            libtruerandom-*.tar.gz
